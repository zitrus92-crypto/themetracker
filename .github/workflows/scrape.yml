name: Daily Finviz Scrape

on:
  schedule:
    # 21:00 UTC = 22:00 CET / 23:00 CEST — after US market close, weekdays
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger via GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/etf_data.json
          git diff --staged --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push
